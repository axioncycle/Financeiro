<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no">
<title>Axion — Pessoal</title>
<style>
:root{
  --bg:#080b16;--bg2:rgba(255,255,255,.045);--bg3:rgba(255,255,255,.07);--card:rgba(255,255,255,.055);--border:rgba(255,255,255,.10);--border2:rgba(255,255,255,.16);
  --input:rgba(255,255,255,.06);--input-border:rgba(255,255,255,.14);--text:#eef2fb;--text2:#a3b1d1;--text3:#5f6d92;--accent:#8b93ff;--sbtn-bg:rgba(255,255,255,.06);
  --glass:blur(16px) saturate(150%);--shadow:0 10px 34px rgba(0,0,0,.42);--shadow-sm:0 3px 14px rgba(0,0,0,.30);
}
body.light{
  --bg:#eef1f8;--bg2:rgba(20,30,70,.04);--bg3:rgba(20,30,70,.07);--card:rgba(255,255,255,.72);--border:rgba(20,30,70,.10);--border2:rgba(20,30,70,.16);
  --input:rgba(255,255,255,.85);--input-border:rgba(20,30,70,.14);--text:#141a2e;--text2:#4a5578;--text3:#8b96b5;--accent:#6d5cf0;--sbtn-bg:rgba(20,30,70,.05);
  --glass:blur(16px) saturate(140%);--shadow:0 10px 30px rgba(60,70,120,.14);--shadow-sm:0 3px 12px rgba(60,70,120,.10);
}
*{box-sizing:border-box;-webkit-tap-highlight-color:transparent;}
button{font-family:inherit;}
body{margin:0;font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,sans-serif;background:var(--bg);color:var(--text);font-size:14px;line-height:1.4;padding-bottom:88px;-webkit-font-smoothing:antialiased;min-height:100vh;}
body::before{content:'';position:fixed;inset:0;z-index:-1;pointer-events:none;background:
  radial-gradient(60% 40% at 12% 18%, rgba(56,189,248,.16), transparent 60%),
  radial-gradient(55% 45% at 88% 42%, rgba(168,85,247,.18), transparent 60%),
  radial-gradient(70% 50% at 50% 108%, rgba(120,140,255,.14), transparent 60%);}
body.light::before{background:
  radial-gradient(60% 40% at 12% 15%, rgba(56,150,248,.16), transparent 60%),
  radial-gradient(55% 45% at 90% 40%, rgba(150,90,247,.14), transparent 60%),
  radial-gradient(70% 50% at 50% 108%, rgba(120,140,255,.12), transparent 60%);}
.num,.kpi .vl,.li .vl,.yr span{font-variant-numeric:tabular-nums;font-feature-settings:"tnum";}
.hdr{display:flex;align-items:center;justify-content:space-between;padding:12px 16px;background:var(--bg2);-webkit-backdrop-filter:var(--glass);backdrop-filter:var(--glass);border-bottom:1px solid var(--border);position:sticky;top:0;z-index:50;box-shadow:var(--shadow-sm);}
.logo{font-size:15px;font-weight:900;color:var(--accent);letter-spacing:1.5px;line-height:1.05;}
.logo small{display:block;font-size:8px;color:var(--text3);letter-spacing:2px;margin-top:2px;}
.icbtn{background:var(--sbtn-bg);border:1px solid var(--border);border-radius:10px;width:40px;height:40px;color:var(--text2);font-size:17px;cursor:pointer;display:flex;align-items:center;justify-content:center;transition:transform .08s,background .15s;}
.icbtn:active{transform:scale(.9);background:var(--bg3);}
.nav{display:flex;background:var(--bg2);-webkit-backdrop-filter:var(--glass);backdrop-filter:var(--glass);border-bottom:1px solid var(--border);position:sticky;top:64px;z-index:40;}
.nb{flex:1;padding:13px 6px;background:none;border:none;border-bottom:2px solid transparent;color:var(--text3);font-size:12px;font-weight:700;cursor:pointer;white-space:nowrap;transition:color .15s;}
.nb.on{color:var(--accent);border-bottom-color:var(--accent);}
.page{display:none;padding:14px;max-width:640px;margin:0 auto;}
.page.on{display:block;animation:fade .22s ease;}
@keyframes fade{from{opacity:0;transform:translateY(4px);}to{opacity:1;transform:none;}}
.card{background:var(--card);-webkit-backdrop-filter:var(--glass);backdrop-filter:var(--glass);border:1px solid var(--border);border-radius:18px;padding:15px;margin-bottom:12px;box-shadow:var(--shadow);}
.hero{position:relative;overflow:hidden;border:1px solid rgba(139,147,255,.35);background:linear-gradient(135deg,rgba(139,147,255,.28),rgba(168,85,247,.16) 55%,rgba(56,189,248,.14));}
.hero::after{content:'';position:absolute;right:-30px;top:-40px;width:180px;height:180px;border-radius:50%;background:radial-gradient(circle,rgba(139,147,255,.35),transparent 70%);pointer-events:none;}
.ttl{font-size:10px;color:var(--accent);font-weight:800;letter-spacing:1.2px;text-transform:uppercase;margin-bottom:10px;}
.kpi-grid{display:grid;grid-template-columns:1fr 1fr;gap:10px;}
.kpi{background:var(--bg2);border:1px solid var(--border);border-radius:12px;padding:12px 13px;}
.kpi .lb{font-size:9px;color:var(--text3);text-transform:uppercase;letter-spacing:1px;font-weight:700;}
.kpi .vl{font-size:18px;font-weight:800;margin-top:4px;letter-spacing:-.2px;}
.li{background:var(--card);border:1px solid var(--border);border-radius:12px;padding:10px 8px 10px 12px;margin-bottom:7px;display:flex;justify-content:space-between;align-items:center;gap:6px;border-left:3px solid var(--accent);}
.li .nm{font-size:13px;font-weight:700;line-height:1.25;}
.li .sb{font-size:10px;color:var(--text3);margin-top:3px;line-height:1.3;}
.li .vl{font-size:15px;font-weight:800;text-align:right;white-space:nowrap;letter-spacing:-.2px;}
.li .del{background:none;border:none;color:#ef4444;font-size:17px;cursor:pointer;width:36px;height:36px;line-height:1;flex-shrink:0;display:inline-flex;align-items:center;justify-content:center;border-radius:9px;transition:transform .08s,background .15s;}
.li .del:active{transform:scale(.88);background:var(--bg3);}
.fi{width:100%;background:var(--input);border:1px solid var(--input-border);border-radius:9px;padding:12px 12px;color:var(--text);font-size:15px;outline:none;transition:border-color .15s,box-shadow .15s;}
input[type=date].fi{-webkit-appearance:none;appearance:none;min-width:0;max-width:100%;}
.fi:focus{border-color:var(--accent);box-shadow:0 0 0 3px rgba(168,85,247,.18);}
.fl{font-size:10px;color:var(--text3);font-weight:700;text-transform:uppercase;letter-spacing:.5px;margin-bottom:5px;display:block;}
.row{display:flex;gap:8px;}
.row>*{flex:1;}
.btn-add{background:transparent;border:1.5px solid var(--accent);color:var(--accent);border-radius:11px;font-weight:800;font-size:14px;cursor:pointer;padding:13px;width:100%;min-height:48px;transition:transform .08s,opacity .15s;}
.btn-add:active{transform:scale(.98);opacity:.75;}
.empty{color:var(--text3);font-size:12px;text-align:center;padding:18px 12px;}
.bar{background:var(--bg3);border-radius:5px;height:8px;margin-top:6px;overflow:hidden;}
.bar>div{height:100%;border-radius:5px;background:var(--accent);transition:width .4s ease;}
.toast{position:fixed;bottom:22px;left:50%;transform:translateX(-50%) translateY(8px);background:var(--accent);color:#fff;padding:11px 20px;border-radius:12px;font-size:13px;font-weight:700;z-index:200;opacity:0;transition:opacity .2s,transform .2s;pointer-events:none;box-shadow:0 6px 24px rgba(0,0,0,.35);max-width:88%;text-align:center;}
.toast.show{opacity:1;transform:translateX(-50%) translateY(0);}
.toast.err{background:#ef4444;}
.gr{color:#22c55e;}.rd{color:#ef4444;}.ac{color:var(--accent);}
.add-box{background:var(--bg2);border:1px dashed var(--border2);border-radius:13px;padding:13px;margin-top:10px;}
.sub{display:flex;gap:6px;flex-wrap:wrap;margin-bottom:12px;}
.sub .sbn{flex:1 1 auto;text-align:center;padding:8px 6px;font-size:11px;}
.sub::-webkit-scrollbar{display:none;}
.sbn{flex:0 0 auto;padding:9px 14px;border-radius:20px;border:1px solid var(--border);background:var(--sbtn-bg);color:var(--text2);font-size:11px;font-weight:700;cursor:pointer;white-space:nowrap;transition:transform .08s;}
.sbn:active{transform:scale(.94);}
.sbn.on{background:var(--accent);color:#fff;border-color:var(--accent);}
.mrow{display:flex;gap:5px;flex-wrap:wrap;margin-bottom:12px;}
.mb{flex:1 0 21%;padding:10px 0;border-radius:9px;border:1px solid var(--border);background:var(--sbtn-bg);color:var(--text2);font-size:11px;font-weight:700;cursor:pointer;transition:transform .08s;}
.mb:active{transform:scale(.94);}
.mb.on{background:var(--accent);color:#fff;border-color:var(--accent);}
.yr{display:flex;align-items:center;justify-content:center;gap:16px;margin-bottom:10px;}
.yr button{background:var(--sbtn-bg);border:1px solid var(--border);border-radius:10px;width:40px;height:40px;color:var(--text);font-size:18px;cursor:pointer;transition:transform .08s;}
.yr button:active{transform:scale(.9);}
.yr span{font-size:17px;font-weight:800;color:var(--accent);min-width:64px;text-align:center;}
@media (prefers-reduced-motion:reduce){*{animation:none!important;transition:none!important;}}
</style>
</head>
<body>
<div id="toast" class="toast"></div>
<div id="ov" style="display:none;position:fixed;inset:0;background:rgba(0,0,0,.65);z-index:300;overflow-y:auto;padding:16px;">
  <div style="max-width:640px;margin:0 auto;background:var(--card);border:1px solid var(--border);border-radius:14px;padding:16px;" id="ov-body"></div>
</div>
<div class="hdr">
  <div class="logo">AXION CYCLE<small>PESSOAL</small></div>
  <div style="display:flex;gap:8px;">
    <button class="icbtn" onclick="recarregar()" title="Atualizar">⟳</button>
    <button class="icbtn" onclick="toggleTheme()" title="Tema">◐</button>
  </div>
</div>
<div class="nav" id="nav">
  <button class="nb on" data-pg="dash" onclick="goTo('dash')">Dashboard</button>
  <button class="nb" data-pg="patr" onclick="goTo('patr')">Patrimônio</button>
  <button class="nb" data-pg="orc" onclick="goTo('orc')">Meu Bolso</button>
</div>

<div id="pg-dash" class="page on"></div>
<div id="pg-patr" class="page"></div>
<div id="pg-orc" class="page"></div>

<script>
var SUPA_URL="https://qbnnxdqmxiwdgzciqhvx.supabase.co";
var SUPA_KEY="eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InFibm54ZHFteGl3ZGd6Y2lxaHZ4Iiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzgxOTc3MDQsImV4cCI6MjA5Mzc3MzcwNH0.o175qai8T3sJA4ISbLL3uaeqj8nTByADCcqVjwpoFGk";
var HDRS={'apikey':SUPA_KEY,'Authorization':'Bearer '+SUPA_KEY,'Content-Type':'application/json'};
var ITEMS=[];
var MONTHS=['Jan','Fev','Mar','Abr','Mai','Jun','Jul','Ago','Set','Out','Nov','Dez'];
var BANCOS=['DollarApp','Inter','Revolut','Wise','Nomad'];
var PRODUTOS_RF=['Cofrinho','CDB','LCI','LCA','Poupança'];
var patrSub='cofr';
var _n=new Date();
var selYear=_n.getFullYear();
var selMonth=_n.getMonth()+1; // 1..12

// ── Utils ──────────────────────────────────────────────
function fmt(v){v=+v||0;return 'R$ '+v.toLocaleString('pt-BR',{minimumFractionDigits:2,maximumFractionDigits:2});}
function fmtUSD(v){v=+v||0;return 'US$ '+v.toLocaleString('pt-BR',{minimumFractionDigits:2,maximumFractionDigits:2});}
function parseBRL(s){if(typeof s==='number')return s;s=(s||'').toString().trim();if(!s)return 0;s=s.replace(/[R$US\s.]/g,'').replace(',','.');return parseFloat(s)||0;}
function parseNum(s){return parseFloat((s||'0').toString().replace(/\./g,'').replace(',','.'))||0;}
// Quantidade de cotas: aceita fracionado com ponto (0.769) ou vírgula (0,769)
function parseQtd(s){s=(s||'').toString().trim();if(!s)return 0;if(s.indexOf(',')>=0)s=s.replace(/\./g,'').replace(',','.');return parseFloat(s)||0;}
function maskBRL(el){var v=el.value.replace(/\D/g,'');if(!v){el.value='';return;}el.value=(parseInt(v,10)/100).toLocaleString('pt-BR',{minimumFractionDigits:2,maximumFractionDigits:2});}
function today(){var d=new Date();return d.getFullYear()+'-'+String(d.getMonth()+1).padStart(2,'0')+'-'+String(d.getDate()).padStart(2,'0');}
function curMk(){return today().slice(0,7);}
function selMk(){return selYear+'-'+String(selMonth).padStart(2,'0');}
function esc(s){return String(s==null?'':s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');}
function toast(m,err){var t=document.getElementById('toast');t.textContent=m;t.className='toast show'+(err?' err':'');setTimeout(function(){t.className='toast';},2200);}
function fmtData(d){if(!d)return '';var p=(d||'').slice(0,10).split('-');return p.length===3?p[2]+'/'+p[1]+'/'+p[0]:d;}
function toggleTheme(){document.body.classList.toggle('light');try{localStorage.setItem('pf_theme',document.body.classList.contains('light')?'light':'dark');}catch(e){}}

// ── Supabase (pf_items) ────────────────────────────────
function loadItems(cb){
  fetch(SUPA_URL+'/rest/v1/pf_items?select=*&order=id',{headers:HDRS})
    .then(function(r){return r.json();})
    .then(function(rows){ITEMS=Array.isArray(rows)?rows:[];cb&&cb();})
    .catch(function(){toast('Sem conexão com o banco',true);ITEMS=[];cb&&cb();});
}
function addItem(obj,cb){
  fetch(SUPA_URL+'/rest/v1/pf_items',{method:'POST',headers:Object.assign({},HDRS,{'Prefer':'return=representation'}),body:JSON.stringify(obj)})
    .then(function(r){return r.json();})
    .then(function(rows){if(Array.isArray(rows)&&rows[0])ITEMS.push(rows[0]);cb&&cb();})
    .catch(function(){toast('Erro ao salvar',true);cb&&cb();});
}
function updItem(id,obj,cb){
  fetch(SUPA_URL+'/rest/v1/pf_items?id=eq.'+id,{method:'PATCH',headers:HDRS,body:JSON.stringify(obj)})
    .then(function(r){if(!r.ok)toast('Falha ao salvar: '+r.status,true);var it=ITEMS.find(function(x){return x.id===id;});if(it)Object.assign(it,obj);cb&&cb();})
    .catch(function(){toast('Erro ao salvar',true);cb&&cb();});
}
function delItem(id,cb){
  fetch(SUPA_URL+'/rest/v1/pf_items?id=eq.'+id,{method:'DELETE',headers:HDRS})
    .then(function(){ITEMS=ITEMS.filter(function(x){return x.id!==id;});cb&&cb();})
    .catch(function(){toast('Erro ao remover',true);cb&&cb();});
}
function byTipo(t){return ITEMS.filter(function(x){return x.tipo===t;});}
// Recarrega dados do banco + cotações
function recarregar(){
  toast('Atualizando...');
  loadItems(function(){render();fetchPrices(function(){render();});fetchDolar();fetchCdi();});
}

// ── Cotação do dólar (config) ──────────────────────────
function getDolar(){var c=ITEMS.find(function(x){return x.tipo==='config'&&x.nome==='dolar_rate';});return c&&+c.valor?+c.valor:5.40;}
// ── Cotações de ações ao vivo (Yahoo via proxy) ────────
var QUOTE_URL='https://financeiro-ten-kappa.vercel.app/api/quote';
var _prices={};
function tickerOf(a){return ((a.nome||'').split('·')[0].trim().split(/\s+/)[0]||'').toUpperCase();}
function yahooSym(a){var t=tickerOf(a);return a.tipo==='acao_br'?(t+'.SA'):(a.tipo==='cripto'?(t+'-USD'):t);}
function precoAtual(a){var q=_prices[yahooSym(a)];return q&&q.price?q.price:0;}
function curVal(a){var p=precoAtual(a);return p>0?(+a.qtd||0)*p:(+a.valor||0);} // moeda nativa; sem preço → usa custo
function ganhoInfo(a){var custo=+a.valor||0,cv=curVal(a),g=cv-custo;return{cv:cv,custo:custo,g:g,pct:custo>0?g/custo*100:0,live:precoAtual(a)>0};}
function fmtCur(v,moeda){return moeda==='US$'?fmtUSD(v):fmt(v);}
function nomeAtivo(a){var q=_prices[yahooSym(a)];return q&&q.name?q.name:'';}
// ── Nova compra (aporte) — soma à posição existente ────
var aporteId=null;
function novaCompra(id){aporteId=id;editingId=null;render();}
function cancelAporte(){aporteId=null;render();}
function aporteBox(a,moeda){
  return '<div class="li" style="display:block;border-left-color:#22c55e;">'+
    '<div style="font-size:12px;font-weight:700;margin-bottom:4px;">Nova compra — '+esc(a.nome||'')+'</div>'+
    '<div style="font-size:10px;color:var(--text3);margin-bottom:6px;">Atual: '+(+a.qtd||0)+' cotas · pago '+fmtCur(a.valor,moeda)+'</div>'+
    '<div class="row"><div><label class="fl">Qtd comprada</label><input class="fi" id="ap-qtd" inputmode="decimal" placeholder="0"></div>'+
    '<div><label class="fl">Valor pago ('+moeda+')</label><input class="fi" id="ap-val" inputmode="decimal" placeholder="0,00" oninput="maskBRL(this)"></div></div>'+
    '<div class="row" style="margin-top:10px;"><button class="btn-add" style="border-color:#22c55e;color:#22c55e;" onclick="saveAporte('+a.id+')">✓ Somar à posição</button><button class="btn-add" style="border-color:var(--text3);color:var(--text3);" onclick="cancelAporte()">Cancelar</button></div>'+
  '</div>';
}
function saveAporte(id){
  var a=ITEMS.find(function(x){return x.id===id;});if(!a)return;
  var q=parseQtd(document.getElementById('ap-qtd').value);
  var v=parseBRL(document.getElementById('ap-val').value);
  if(!q&&!v){toast('Informe quantidade e valor',true);return;}
  aporteId=null;
  updItem(id,{qtd:(+a.qtd||0)+q,valor:(+a.valor||0)+v},function(){render();toast('Compra somada à posição!');});
}
// ── Gráfico de pizza (SVG) ─────────────────────────────
var PIE_COLORS=['#a855f7','#22c55e','#60a5fa','#f59e0b','#ef4444','#16a34a','#a3e635','#ec4899','#14b8a6','#f97316','#8b5cf6','#06b6d4','#eab308','#f43f5e','#84cc16','#0ea5e9'];
function svgPie(slices,size){
  var tot=slices.reduce(function(s,x){return s+x.value;},0);if(tot<=0)return '';
  var r=size/2,cx=r,cy=r,ang=-Math.PI/2,p='';
  slices.forEach(function(sl){
    var frac=sl.value/tot,a2=ang+frac*2*Math.PI;
    if(frac>=0.9999){p+='<circle cx="'+cx+'" cy="'+cy+'" r="'+r+'" fill="'+sl.color+'"/>';return;}
    var x1=cx+r*Math.cos(ang),y1=cy+r*Math.sin(ang),x2=cx+r*Math.cos(a2),y2=cy+r*Math.sin(a2);
    p+='<path d="M'+cx+','+cy+' L'+x1.toFixed(2)+','+y1.toFixed(2)+' A'+r+','+r+' 0 '+(frac>0.5?1:0)+' 1 '+x2.toFixed(2)+','+y2.toFixed(2)+' Z" fill="'+sl.color+'"/>';
    ang=a2;
  });
  return '<svg width="'+size+'" height="'+size+'" viewBox="0 0 '+size+' '+size+'" style="flex-shrink:0;">'+p+'</svg>';
}
function pieSection(items,moeda){
  var arr=items.map(function(a,i){return {label:tickerOf(a)||esc(a.nome),value:curVal(a)};}).filter(function(x){return x.value>0;}).sort(function(a,b){return b.value-a.value;});
  if(arr.length<2)return '';
  var tot=arr.reduce(function(s,x){return s+x.value;},0);
  arr.forEach(function(x,i){x.color=PIE_COLORS[i%PIE_COLORS.length];});
  var leg=arr.map(function(x){return '<div style="display:flex;align-items:center;gap:5px;font-size:10px;margin-bottom:3px;"><span style="width:9px;height:9px;border-radius:2px;background:'+x.color+';flex-shrink:0;"></span><span style="flex:1;min-width:0;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;">'+esc(x.label)+'</span><span style="color:var(--text3);">'+(x.value/tot*100).toFixed(1)+'%</span></div>';}).join('');
  return '<div style="display:flex;gap:12px;align-items:center;margin:6px 0 12px;">'+svgPie(arr,110)+'<div style="flex:1;min-width:0;">'+leg+'</div></div>';
}
function fetchPrices(cb){
  var acoes=byTipo('acao_br').concat(byTipo('acao_eua')).concat(byTipo('cripto'));
  var syms=acoes.map(yahooSym).filter(function(s){return s&&s.length>1;});
  syms=syms.filter(function(s,i){return syms.indexOf(s)===i;});
  if(!syms.length){cb&&cb();return;}
  fetch(QUOTE_URL+'?symbols='+encodeURIComponent(syms.join(','))).then(function(r){return r.json();}).then(function(j){_prices=j||{};cb&&cb();}).catch(function(){cb&&cb();});
}
function atualizarCotacoes(){toast('Atualizando cotações...');fetchPrices(function(){render();fetchDolar();});}
// Busca a cotação USD/BRL ao vivo e salva
function fetchDolar(){
  toast('Buscando cotação do dólar...');
  fetch('https://economia.awesomeapi.com.br/last/USD-BRL').then(function(r){return r.json();}).then(function(j){
    var bid=j&&j.USDBRL&&parseFloat(j.USDBRL.bid);
    if(bid){setDolar(Math.round(bid*100)/100);toast('Dólar atualizado: R$ '+fmtN(bid));}
    else toast('Não consegui a cotação',true);
  }).catch(function(){toast('Sem conexão para buscar cotação',true);});
}
function setDolar(v){
  var c=ITEMS.find(function(x){return x.tipo==='config'&&x.nome==='dolar_rate';});
  if(c) updItem(c.id,{valor:v},function(){render();});
  else addItem({tipo:'config',nome:'dolar_rate',valor:v},function(){render();});
}
// ── CDI (rendimento dos cofrinhos) ─────────────────────
var CDI_URL='https://financeiro-ten-kappa.vercel.app/api/cdi';
function getCdi(){var c=ITEMS.find(function(x){return x.tipo==='config'&&x.nome==='cdi_rate';});return c&&+c.valor?+c.valor:14.65;}
function setCdi(v){var c=ITEMS.find(function(x){return x.tipo==='config'&&x.nome==='cdi_rate';});if(c)updItem(c.id,{valor:v},function(){render();});else addItem({tipo:'config',nome:'cdi_rate',valor:v},function(){render();});}
function fetchCdi(){
  fetch(CDI_URL).then(function(r){return r.json();}).then(function(j){if(j&&j.cdi){setCdi(Math.round(j.cdi*100)/100);toast('CDI atualizado: '+fmtN(j.cdi)+'% a.a.');}}).catch(function(){});
}
function diasDesde(d){if(!d)return 0;var a=new Date((d.slice(0,10))+'T00:00:00'),b=new Date(today()+'T00:00:00');var ms=b-a;return ms>0?Math.floor(ms/86400000):0;}
// Feriados B3/bancários (nacionais + móveis via Páscoa) para contar dias úteis (base 252)
function _easter(y){var a=y%19,b=Math.floor(y/100),c=y%100,d=Math.floor(b/4),e=b%4,f=Math.floor((b+8)/25),g=Math.floor((b-f+1)/3),h=(19*a+b-d-g+15)%30,i=Math.floor(c/4),k=c%4,l=(32+2*e+2*i-h-k)%7,m=Math.floor((a+11*h+22*l)/451),mo=Math.floor((h+l-7*m+114)/31),da=((h+l-7*m+114)%31)+1;return new Date(y,mo-1,da);}
var _holCache={};
function _holidays(y){
  var e=_easter(y),H={};
  function add(dt){H[dt.getFullYear()+'-'+String(dt.getMonth()+1).padStart(2,'0')+'-'+String(dt.getDate()).padStart(2,'0')]=1;}
  function off(n){var x=new Date(e);x.setDate(x.getDate()+n);return x;}
  [[0,1],[3,21],[4,1],[8,7],[9,12],[10,2],[10,15],[10,20],[11,25]].forEach(function(md){add(new Date(y,md[0],md[1]));});
  add(off(-48));add(off(-47));add(off(-2));add(off(60)); // carnaval seg/ter, sexta santa, corpus christi
  return H;
}
function _isHol(dt){var y=dt.getFullYear();if(!_holCache[y])_holCache[y]=_holidays(y);return !!_holCache[y][y+'-'+String(dt.getMonth()+1).padStart(2,'0')+'-'+String(dt.getDate()).padStart(2,'0')];}
function diasUteis(dataStr){
  if(!dataStr)return 0;
  var a=new Date(dataStr.slice(0,10)+'T00:00:00'),b=new Date(today()+'T00:00:00');
  if(b<=a)return 0;
  var n=0,cur=new Date(a);cur.setDate(cur.getDate()+1);
  while(cur<=b){var wd=cur.getDay();if(wd!==0&&wd!==6&&!_isHol(cur))n++;cur.setDate(cur.getDate()+1);}
  return n;
}
// Rendimento do cofrinho: X% do CDI (qtd = % do CDI, padrão 105) por DIAS ÚTEIS (base 252)
// Meses completos (aniversários) desde a aplicação — para a poupança
function mesesCompletos(dataStr){
  if(!dataStr)return 0;
  var a=new Date(dataStr.slice(0,10)+'T00:00:00'),b=new Date(today()+'T00:00:00');
  if(b<=a)return 0;
  var m=(b.getFullYear()-a.getFullYear())*12+(b.getMonth()-a.getMonth());
  if(b.getDate()<a.getDate())m--;
  return m<0?0:m;
}
// Regra da poupança: 0,5%/mês se Selic>8,5% a.a.; senão 70% da Selic (TR≈0)
function selicAnual(){return getCdi()+0.10;} // Selic ≈ CDI + 0,1
function poupancaRateMes(){var s=selicAnual();if(s>8.5)return 0.005;var sm=Math.pow(1+s/100,1/12)-1;return 0.70*sm;}
function poupancaRend(c){var pv=+c.valor||0;if(pv<=0)return 0;var m=mesesCompletos(c.data);if(!m)return 0;return pv*Math.pow(1+poupancaRateMes(),m)-pv;}
function cofrinhoRend(c){
  if(rfProduto(c)==='Poupança')return poupancaRend(c);
  var pv=+c.valor||0;if(pv<=0)return 0;
  var du=diasUteis(c.data);if(!du)return 0;
  var pctCdi=(+c.qtd||105)/100;
  var iAnual=getCdi()/100*pctCdi;
  return pv*Math.pow(1+iAnual,du/252)-pv;
}
// IOF regressivo — só nos primeiros 30 dias corridos (% sobre o rendimento)
var IOF_TAB=[0,96,93,90,86,83,80,76,73,70,66,63,60,56,53,50,46,43,40,36,33,30,26,23,20,16,13,10,6,3,0];
function iofPct(dc){if(dc>=30)return 0;return (IOF_TAB[dc]||0)/100;}
// Produto da renda fixa fica em categoria. Isentos: LCI/LCA/Poupança. IOF só no CDB.
function rfProduto(c){return c.categoria||'Cofrinho';}
function rfIsento(c){var p=rfProduto(c);return p==='LCI'||p==='LCA'||p==='Poupança';}
function rfTemIOF(c){return rfProduto(c)==='CDB';}
function cofrinhoIOF(c){return rfTemIOF(c)?cofrinhoRend(c)*iofPct(diasDesde(c.data)):0;}
// IR regressivo (sobre o rendimento após IOF, por dias corridos)
function irAliquota(dc){if(dc<=180)return .225;if(dc<=360)return .20;if(dc<=720)return .175;return .15;}
function cofrinhoIR(c){return rfIsento(c)?0:(cofrinhoRend(c)-cofrinhoIOF(c))*irAliquota(diasDesde(c.data));}
function cofrinhoRendLiq(c){return cofrinhoRend(c)-cofrinhoIOF(c)-cofrinhoIR(c);}
function cofrinhoAtual(c){return (+c.valor||0)+cofrinhoRendLiq(c);}

// ── Navegação ──────────────────────────────────────────
var CUR='dash';
function goTo(pg){
  CUR=pg;
  document.querySelectorAll('.page').forEach(function(p){p.classList.remove('on');});
  document.querySelectorAll('.nb').forEach(function(b){b.classList.toggle('on',b.getAttribute('data-pg')===pg);});
  document.getElementById('pg-'+pg).classList.add('on');
  render();window.scrollTo(0,0);
}

// ── Totais ─────────────────────────────────────────────
function sumTipo(t){return byTipo(t).reduce(function(s,i){return s+(+i.valor||0);},0);}
function totCofrinhos(){return byTipo('cofrinho').reduce(function(s,c){return s+cofrinhoAtual(c);},0);}
function totTerrenos(){return sumTipo('terreno');}
function totAcoesBR(){return byTipo('acao_br').reduce(function(s,a){return s+curVal(a);},0);}
function totAcoesEUAusd(){return byTipo('acao_eua').reduce(function(s,a){return s+curVal(a);},0);}
function totCriptoUsd(){return byTipo('cripto').reduce(function(s,a){return s+curVal(a);},0);}
function totCriptoBrl(){return totCriptoUsd()*getDolar();}
function totDolarUsd(){return sumTipo('dolar');}
function totAcoesEUAbrl(){return totAcoesEUAusd()*getDolar();}
function totDolarBrl(){return totDolarUsd()*getDolar();}
function totDevedores(){return sumTipo('devedor');}
function patrimonioTotal(){return totCofrinhos()+totTerrenos()+totAcoesBR()+totAcoesEUAbrl()+totCriptoBrl()+totDolarBrl()+totDevedores();}
function totGastosFixosMes(mk){return byTipo('gasto_fixo').filter(function(g){return (g.data||'').slice(0,7)===mk;}).reduce(function(s,g){return s+(+g.valor||0);},0);}
function totGastosExtrasMes(mk){return byTipo('gasto_extra').filter(function(g){return (g.data||'').slice(0,7)===mk;}).reduce(function(s,g){return s+(+g.valor||0);},0);}

function render(){
  if(CUR==='dash')renderDash();
  else if(CUR==='patr')renderPatr();
  else if(CUR==='orc')renderOrcamento();
}

        '<div style="min-width:0;">'+
          '<div style="font-size:11px;color:var(--text2);font-weight:600;letter-spacing:.5px;">Patrimônio Total</div>'+
          '<div class="num" style="font-size:33px;font-weight:900;color:#fff;letter-spacing:-.5px;margin-top:2px;line-height:1.05;">'+fmt(pt)+'</div>'+

        sparkHero()+
      '</div>'+
    '</div>'+
    '<div class="kpi-grid">'+
      kpi('Renda Fixa',totCofrinhos(),'#60a5fa')+
      kpi('Terrenos',totTerrenos(),'#f59e0b')+
      kpi('Ações BR',totAcoesBR(),'#22c55e')+
      kpi('Ações EUA',totAcoesEUAbrl(),'#22c55e')+
    '</div>'+
    '<div class="kpi-grid" style="margin-top:10px;">'+
      kpi('Cripto',totCriptoBrl(),'#f59e0b')+
      kpi('Dólar (reserva)',totDolarBrl(),'#a3e635')+
    '</div>'+
    (totDevedores()>0?'<div style="margin-top:10px;">'+kpi('Devedores (a receber)',totDevedores(),'#eab308')+'</div>':'')+
    distribuicao();
}
function fmtN(v){return (+v||0).toLocaleString('pt-BR',{minimumFractionDigits:2,maximumFractionDigits:2});}
function kpi(lb,vl,col){return '<div class="kpi"><div style="display:flex;align-items:center;gap:6px;"><span style="width:7px;height:7px;border-radius:50%;background:'+col+';flex-shrink:0;box-shadow:0 0 8px '+col+';"></span><div class="lb">'+lb+'</div></div><div class="vl" style="color:'+col+';margin-top:5px;">'+fmt(vl)+'</div></div>';}
function sparkHero(){
  var d='M0,25 L14,21 L28,23 L42,15 L56,18 L70,9 L84,12 L100,3';
  return '<svg width="112" height="40" viewBox="0 0 100 30" preserveAspectRatio="none" style="flex-shrink:0;">'+
    '<defs><linearGradient id="sg" x1="0" y1="0" x2="1" y2="0"><stop offset="0" stop-color="#38bdf8"/><stop offset=".5" stop-color="#8b93ff"/><stop offset="1" stop-color="#c084fc"/></linearGradient>'+
    '<linearGradient id="sgf" x1="0" y1="0" x2="0" y2="1"><stop offset="0" stop-color="#8b93ff" stop-opacity=".35"/><stop offset="1" stop-color="#8b93ff" stop-opacity="0"/></linearGradient></defs>'+
    '<path d="'+d+' L100,30 L0,30 Z" fill="url(#sgf)"/>'+
    '<path d="'+d+'" fill="none" stroke="url(#sg)" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"/></svg>';
}
function distribuicao(){
  var pt=patrimonioTotal();if(pt<=0)return '';
  var parts=[['Renda Fixa',totCofrinhos(),'#60a5fa'],['Terrenos',totTerrenos(),'#f59e0b'],['Ações BR',totAcoesBR(),'#22c55e'],['Ações EUA',totAcoesEUAbrl(),'#16a34a'],['Cripto',totCriptoBrl(),'#eab308'],['Dólar',totDolarBrl(),'#a3e635'],['Devedores',totDevedores(),'#f97316']];
  var slices=parts.filter(function(p){return p[1]>0;}).map(function(p){return {label:p[0],value:p[1],color:p[2]};}).sort(function(a,b){return b.value-a.value;});
  if(!slices.length)return '';
  var leg=slices.map(function(x){return '<div style="display:flex;align-items:center;gap:7px;font-size:11px;margin-bottom:6px;"><span style="width:11px;height:11px;border-radius:3px;background:'+x.color+';flex-shrink:0;"></span><span style="flex:1;min-width:0;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;">'+x.label+'</span><span style="color:var(--text3);font-weight:600;">'+(x.value/pt*100).toFixed(1)+'%</span><span class="num" style="min-width:82px;text-align:right;font-weight:700;">'+fmt(x.value)+'</span></div>';}).join('');
  var bars=slices.map(function(x){var pct=x.value/pt*100;return '<div style="margin-bottom:8px;"><div style="display:flex;justify-content:space-between;font-size:11px;margin-bottom:2px;"><span>'+x.label+'</span><span style="font-weight:700;">'+pct.toFixed(1)+'% · '+fmt(x.value)+'</span></div><div class="bar"><div style="width:'+pct.toFixed(1)+'%;background:'+x.color+';"></div></div></div>';}).join('');
  return '<div class="card"><div class="ttl">Distribuição do Patrimônio</div>'+
    '<div style="display:flex;gap:14px;align-items:center;flex-wrap:wrap;justify-content:center;">'+svgPie(slices,140)+'<div style="flex:1;min-width:180px;">'+leg+'</div></div>'+
    '<div style="margin-top:14px;padding-top:12px;border-top:1px solid var(--border);">'+bars+'</div>'+
  '</div>';
}

  else if(patrSub==='abr')b.innerHTML=viewAcoes('acao_br','🇧🇷 Ações Brasil','#22c55e','R$');
  else if(patrSub==='aeua')b.innerHTML=viewAcoes('acao_eua','🇺🇸 Ações EUA','#16a34a','US$');
  else if(patrSub==='cripto')b.innerHTML=viewAcoes('cripto','₿ Criptomoedas','#f59e0b','US$');
  else if(patrSub==='dev')b.innerHTML=viewDevedores();
  else if(patrSub==='dol')b.innerHTML=viewDolar();
}

// Lista simples (terrenos): nome + categoria + valor R$
function viewLista(tipo,titulo,col,hasCat){
  var items=byTipo(tipo);var total=items.reduce(function(s,i){return s+(+i.valor||0);},0);
  var h='<div class="card"><div class="ttl">'+titulo+'</div><div style="font-size:20px;font-weight:800;color:'+col+';margin-bottom:10px;">'+fmt(total)+'</div>';
  if(!items.length)h+='<div class="empty">Nenhum item</div>';
  items.forEach(function(it){if(editingId===it.id){h+=editorBox(it);return;}h+='<div class="li" style="border-left-color:'+col+';"><div style="flex:1;min-width:0;"><div class="nm">'+esc(it.nome||'—')+'</div>'+(it.categoria||it.data?'<div class="sb">'+esc(it.categoria||'')+(it.categoria&&it.data?' · ':'')+(it.data?'📅 '+fmtData(it.data):'')+'</div>':'')+'</div><div class="vl" style="color:'+col+';">'+fmt(it.valor)+'</div>'+itemActions(it)+'</div>';});
  h+='<div class="add-box"><label class="fl">Nome</label><input class="fi" id="add-nome" placeholder="Descrição">'+
     (hasCat?'<label class="fl" style="margin-top:8px;">Local / Categoria</label><input class="fi" id="add-cat" placeholder="Opcional">':'')+
     '<div class="row" style="margin-top:8px;"><div><label class="fl">Valor (R$)</label><input class="fi" id="add-val" inputmode="decimal" placeholder="0,00" oninput="maskBRL(this)"></div>'+
     '<div><label class="fl">Data</label><input class="fi" id="add-data" type="date" value="'+today()+'"></div></div>'+
     '<button class="btn-add" style="margin-top:10px;" onclick="addSimple(\''+tipo+'\','+(hasCat?1:0)+')">+ Adicionar</button></div>';
  return h+'</div>';
}
function addSimple(tipo,hasCat){
  var nome=(document.getElementById('add-nome').value||'').trim();
  var val=parseBRL(document.getElementById('add-val').value);
  if(!nome){toast('Informe o nome',true);return;}
  var obj={tipo:tipo,nome:nome,valor:val,data:(document.getElementById('add-data')||{value:''}).value||today()};
  if(hasCat){var c=document.getElementById('add-cat');if(c)obj.categoria=(c.value||'').trim();}
  addItem(obj,function(){render();toast('Adicionado!');});
}

// Ações (BR em R$, EUA em US$): ticker + qtd + VALOR PAGO. Preço ao vivo → valor atual + % ganho
function viewAcoes(tipo,titulo,col,moeda){
  var items=byTipo(tipo);
  var isUSD=(moeda==='US$');
  var totCur=items.reduce(function(s,a){return s+curVal(a);},0);        // valor atual (moeda nativa)
  var totCusto=items.reduce(function(s,a){return s+(+a.valor||0);},0);  // valor pago
  var totG=totCur-totCusto, totPct=totCusto>0?totG/totCusto*100:0;
  var gcol=totG>=0?'#22c55e':'#ef4444';
  var h='<div class="card"><div class="ttl">'+titulo+'</div>';
  if(isUSD){
    h+='<div style="display:flex;align-items:baseline;gap:12px;flex-wrap:wrap;"><div style="font-size:20px;font-weight:800;color:'+col+';">'+fmtUSD(totCur)+'</div><div style="font-size:20px;font-weight:800;color:var(--accent);">'+fmt(totCur*getDolar())+'</div></div>';
  } else {
    h+='<div style="font-size:20px;font-weight:800;color:'+col+';">'+fmt(totCur)+'</div>';
  }
  h+='<div style="font-size:11px;margin-bottom:8px;"><span style="color:'+gcol+';font-weight:700;">'+(totG>=0?'▲ +':'▼ ')+fmtCur(totG,moeda)+' ('+totPct.toFixed(2)+'%)</span> <span style="color:var(--text3);">· pago '+fmtCur(totCusto,moeda)+(isUSD?' · US$ '+fmtN(getDolar()):'')+'</span> <span style="color:var(--accent);cursor:pointer;font-weight:700;" onclick="atualizarCotacoes()">🔄 atualizar</span></div>';
  if(items.length>=2) h+=pieSection(items,moeda);
  if(!items.length)h+='<div class="empty">Nenhuma ação</div>';
  items.slice().sort(function(x,y){return curVal(y)-curVal(x);}).forEach(function(a){
    if(editingId===a.id){h+=editorBox(a);return;}
    if(aporteId===a.id){h+=aporteBox(a,moeda);return;}
    var info=ganhoInfo(a),igc=info.g>=0?'#22c55e':'#ef4444';
    h+='<div class="li" style="border-left-color:'+col+';"><div style="flex:1;min-width:0;">'+
       '<div class="nm">'+esc(a.nome||'—')+(nomeAtivo(a)?' <span style="font-size:10px;color:var(--text3);font-weight:400;">· '+esc(nomeAtivo(a))+'</span>':'')+'</div>'+
       '<div class="sb">'+(+a.qtd||0)+' cotas · pago '+fmtCur(a.valor,moeda)+' · <span style="color:'+igc+';font-weight:700;">'+(info.g>=0?'+':'')+info.pct.toFixed(2)+'%</span>'+(info.live?'':' <span style="color:#f59e0b;">(sem cotação)</span>')+(a.data?' · 📅 '+fmtData(a.data):'')+'</div></div>'+
       '<div style="text-align:right;"><div class="vl" style="color:'+col+';">'+fmtCur(info.cv,moeda)+'</div>'+(isUSD?'<div style="font-size:10px;color:var(--accent);">'+fmt(info.cv*getDolar())+'</div>':'')+'</div>'+
       '<button class="del" style="color:#22c55e;font-size:17px;" onclick="novaCompra('+a.id+')" title="Nova compra">＋</button>'+itemActions(a)+'</div>';});
  h+='<div class="add-box"><label class="fl">Ticker (ex: '+(isUSD?'AAPL, VOO':'PETR4, ITUB4')+')</label><input class="fi" id="ac-nome" placeholder="'+(isUSD?'AAPL':'PETR4')+'">'+
     '<div class="row" style="margin-top:8px;"><div><label class="fl">Quantidade</label><input class="fi" id="ac-qtd" inputmode="decimal" placeholder="0"></div>'+
     '<div><label class="fl">Valor pago ('+moeda+')</label><input class="fi" id="ac-val" inputmode="decimal" placeholder="0,00" oninput="maskBRL(this)"></div></div>'+
     '<label class="fl" style="margin-top:8px;">Data da compra</label><input class="fi" id="ac-data" type="date" value="'+today()+'">'+
     '<div style="font-size:10px;color:var(--text3);margin-top:5px;">O preço atual é buscado ao vivo pelo ticker. Use o código exato da ação.</div>'+
     '<button class="btn-add" style="margin-top:8px;" onclick="addAcao(\''+tipo+'\')">+ Adicionar</button></div>';
  return h+'</div>';
}
function addAcao(tipo){
  var nome=(document.getElementById('ac-nome').value||'').trim().toUpperCase();
  var qtd=parseQtd(document.getElementById('ac-qtd').value);
  var val=parseBRL(document.getElementById('ac-val').value);
  if(!nome){toast('Informe o ativo',true);return;}
  // Se o ticker já existe, soma à posição (atualiza qtd, custo e média)
  var existente=byTipo(tipo).find(function(a){return tickerOf(a)===nome;});
  if(existente){
    updItem(existente.id,{qtd:(+existente.qtd||0)+qtd,valor:(+existente.valor||0)+val},function(){fetchPrices(function(){render();});toast(nome+' atualizado (posição somada)!');});

// Retirada — reduz US$ e custo proporcionalmente (mantém a taxa média)
function registrarRetirada(){
  var sel=document.getElementById('dl-rt-item');
  var banco=sel?sel.value:'';
  if(!banco){toast('Selecione o banco',true);return;}
  var out=parseBRL(document.getElementById('dl-rt-val').value);
  if(!out){toast('Informe o valor retirado',true);return;}
  var reservas=byTipo('dolar').filter(function(d){return (d.nome||'')===banco;});
  var totUsd=reservas.reduce(function(s,d){return s+(+d.valor||0);},0);
  if(!totUsd){toast('Banco sem saldo',true);return;}
  var sacado=Math.min(out,totUsd);
  var desc=((document.getElementById('dl-rt-desc')||{value:''}).value||'').trim();
  function logSaida(cb){addItem({tipo:'dolar_saida',nome:banco,categoria:desc,valor:sacado,data:today()},cb);}
  if(out>=totUsd){
    if(!confirm('Retirar todo o saldo de '+banco+' e remover as reservas?'))return;
    var pd=reservas.length;
    reservas.forEach(function(d){delItem(d.id,function(){pd--;if(pd<=0){logSaida(function(){render();toast('Retirada registrada!');});}});});
    return;
  }
  var factor=out/totUsd, pend=reservas.length;
  reservas.forEach(function(d){
    updItem(d.id,{valor:(+d.valor||0)*(1-factor),meta:(+d.meta||0)*(1-factor)},function(){pend--;if(pend<=0){logSaida(function(){render();toast('Retirada de '+banco+' registrada!');});}});
  });
}

// Parser robusto: cobre fatura multi-linha (BB: data / descrição / país / R$ valor)
// e formato de linha única (data descrição R$ valor). Ignora resumo/limites/juros.
function parseFatura(txt){
  var lines=txt.split(/\n/).map(function(s){return s.trim();}).filter(function(s){return s;});
  var out=[],curDia='01',desc=[],haveDate=false,total=0;
  var reDate=/^(\d{1,2})[\/.](\d{1,2})(?:[\/.]\d{2,4})?$/;
  var reValOnly=/^-?\s*R?\$?\s*\d{1,3}(?:\.\d{3})*,\d{2}$/;
  var reValEnd=/(-?\s*R?\$?\s*\d{1,3}(?:\.\d{3})*,\d{2})\s*$/;
  var noise=/(cota[cç][aã]o do d[oó]lar|d[oó]lar americano|^\*\*\*|^[a-z]{2}$|p[aá]gina|www\.|\.com\.br|central de|ouvidoria|^sac\b|^br$|^gb$|\*{4,}|^data\b|descri[cç][aã]o)/i;
  var skip=/(limite|saldo fatura|pagamentos?\/?cr|resumo|op[cç][oõ]es de pagament|pagamento m[ií]nimo|encargos|juros de mora|multa contratual|CET|mensalidade|pontos smiles|tarifa|informa[cç][oõ]es|compras nacionais|compras internacionais|i[o0]f\b|valor total|subtotal|despesas at[eé]|vencimento)/i;
  for(var i=0;i<lines.length;i++){
    var ln=lines[i];
    if(/total da fatura|valor total devido/i.test(ln)){var mv=ln.match(reValEnd);if(mv)total=parseBRL(mv[1]);else if(lines[i+1]&&reValOnly.test(lines[i+1]))total=parseBRL(lines[i+1]);continue;}
    if(!total&&/^total$/i.test(ln)&&lines[i+1]&&reValOnly.test(lines[i+1])){total=parseBRL(lines[i+1]);continue;}
    if(noise.test(ln))continue;
    if(reDate.test(ln)){var dm=ln.match(reDate);curDia=dm[1];desc=[];haveDate=true;continue;}
    if(reValOnly.test(ln)){
      var v=parseBRL(ln);
      if(haveDate&&v>0&&desc.length){out.push(mkItem(desc.join(' '),v,curDia));}
      desc=[];haveDate=false;continue;
    }
    // XP: linha com DOIS valores no fim (R$ e US$) — pega o R$ (primeiro)
    var m2=ln.match(/(-?\s*\d{1,3}(?:\.\d{3})*,\d{2})\s+(-?\s*R?\$?\s*\d{1,3}(?:\.\d{3})*,\d{2})\s*$/);
    var me=ln.match(reValEnd);
    if(m2||me){
      var idx=m2?m2.index:me.index, valTok=m2?m2[1]:me[1];
      var ld=ln.match(/^(\d{1,2})[\/.](\d{1,2})/);
      var body=ln.slice(0,idx).replace(/^\d{1,2}[\/.]\d{1,2}([\/.]\d{2,4})?\s*/,'').trim();
      var vv=parseBRL(valTok);
      if(vv>0&&(ld||haveDate)&&!skip.test(body)&&(body||desc.length)){out.push(mkItem((desc.join(' ')+' '+body).trim(),vv,ld?ld[1]:curDia));}
      desc=[];haveDate=ld?false:haveDate;continue;
    }
    if(skip.test(ln)){desc=[];continue;}
    desc.push(ln);
  }
  return {items:out,total:total};
}
function mkItem(d,v,dia){
  d=(d||'').replace(/\s+/g,' ').trim()||'Compra';
  return {desc:d,valor:v,dia:String(Math.min(28,Math.max(1,parseInt(dia,10)||1))).padStart(2,'0'),cat:autoCat(d)};
}
function autoCat(d){d=(d||'').toLowerCase();
  if(/(mercado|super|atacad|padaria|acougue|hortifruti|ifood|restaurante|lanch|food|pizzar)/.test(d))return 'Alimentação';
  if(/(uber|99|posto|combust|gasolina|estacion|pedagio|latam|gol|azul)/.test(d))return 'Transporte';
  if(/(farmac|drogaria|unimed|hospital|clinic|laborat)/.test(d))return 'Saúde';
  if(/(netflix|spotify|amazon prime|assinatura|prime|hbo|disney|youtube|apple.com)/.test(d))return 'Assinaturas';
  if(/(shopping|loja|magaz|renner|zara|roupa|americanas|shopee|mercadolivre|aliexpress)/.test(d))return 'Compras';
  return '';
}

// ── Ler PDF da fatura (pdf.js sob demanda) ─────────────
function ensurePdfJs(cb){
  if(window.pdfjsLib){cb();return;}
  var s=document.createElement('script');
  s.src='https://cdnjs.cloudflare.com/ajax/libs/pdf.js/3.11.174/pdf.min.js';
  s.onload=function(){try{pdfjsLib.GlobalWorkerOptions.workerSrc='https://cdnjs.cloudflare.com/ajax/libs/pdf.js/3.11.174/pdf.worker.min.js';}catch(e){}cb();};
  s.onerror=function(){toast('Falha ao carregar leitor de PDF',true);};
  document.head.appendChild(s);
}
function pdfToText(buf,pwd){
  return pdfjsLib.getDocument({data:buf,password:pwd||''}).promise.then(function(pdf){
    var texto='';
    function pagina(p){
      if(p>pdf.numPages)return Promise.resolve(texto);
      return pdf.getPage(p).then(function(pg){return pg.getTextContent();}).then(function(tc){
        var linhas={};
        tc.items.forEach(function(it){if(!it.str)return;var y=Math.round(it.transform[5]);(linhas[y]=linhas[y]||[]).push({x:it.transform[4],s:it.str});});
        Object.keys(linhas).map(Number).sort(function(a,b){return b-a;}).forEach(function(y){
          texto+=linhas[y].sort(function(a,b){return a.x-b.x;}).map(function(o){return o.s;}).join(' ')+'\n';
        });
        return pagina(p+1);
      });
    }
    return pagina(1);
  });
}
function lerPdfFatura(input){
  var f=input.files&&input.files[0];if(!f){return;}
  var pwd=(document.getElementById('fat-pwd')||{value:''}).value||'';
  toast('Lendo PDF...');
  var rd=new FileReader();
  rd.onload=function(e){
    var buf=new Uint8Array(e.target.result);
    ensurePdfJs(function(){
      pdfToText(buf,pwd).then(function(txt){
        var ta=document.getElementById('fat-txt');if(ta)ta.value=txt;
        analisarFatura();
      }).catch(function(err){
        var m=(err&&(err.name||err.message)||'')+'';
        if(/password/i.test(m)) toast('PDF protegido — digite a senha e envie de novo',true);
        else toast('Não consegui ler o PDF — cole o texto manualmente',true);
      });
    });
    input.value='';
  };
  rd.readAsArrayBuffer(f);
}
